<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier utilisateur - NutriWise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="edit_user.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">🌿 NutriWise</div>
            <nav>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="users.html" class="active">👥 Utilisateurs</a>
                <a href="#">🥗 Aliments</a>
                <a href="#">📖 Recettes</a>
                <a href="#">📅 Plans</a>
            </nav>
            <a href="../front/login.html" class="logout">🚪 Déconnexion</a>
        </aside>

        <main class="main-content">
            <header>
                <h1>Modifier l'utilisateur</h1>
            </header>

            <div class="form-container">
                <form>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" value="Sophie">
                        </div>
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" value="Martin">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" value="sophie@email.com">
                        </div>
                        <div class="form-group">
                            <label>Téléphone</label>
                            <input type="tel" value="06 12 34 56 78">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Taille (cm)</label>
                            <input type="number" value="165">
                        </div>
                        <div class="form-group">
                            <label>Poids (kg)</label>
                            <input type="number" value="58">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>IMC</label>
                            <input type="text" value="21.3" readonly>
                        </div>
                        <div class="form-group">
                            <label>Statut</label>
                            <select>
                                <option selected>Actif</option>
                                <option>Inactif</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Objectif</label>
                        <select>
                            <option>Perte de poids</option>
                            <option selected>Maintien</option>
                            <option>Prise de muscle</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-save">Enregistrer</button>
                        <a href="users.html" class="btn-cancel">Annuler</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
