<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - NutriWise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="register-container">
        <div class="register-left">
            <div class="brand">
                <span class="logo-icon">🌿</span>
                <h1>NutriWise</h1>
                <p>Rejoignez une communauté qui prend soin de sa santé</p>
            </div>
            <div class="benefits">
                <div class="benefit">
                    <span>🥗</span>
                    <p>Nutrition personnalisée</p>
                </div>
                <div class="benefit">
                    <span>📊</span>
                    <p>Suivi intelligent</p>
                </div>
                <div class="benefit">
                    <span>👥</span>
                    <p>Communauté active</p>
                </div>
            </div>
        </div>
        <div class="register-right">
            <div class="register-form-container">
                <h2>Créer un compte</h2>
                <p class="subtitle">Commencez votre voyage vers une meilleure santé</p>
                
                <form class="register-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label>Prénom</label>
                            <input type="text" placeholder="Jean" required>
                        </div>
                        <div class="input-group">
                            <label>Nom</label>
                            <input type="text" placeholder="Dupont" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="jean@email.com" required>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Mot de passe</label>
                            <input type="password" placeholder="••••••••" required>
                        </div>
                        <div class="input-group">
                            <label>Confirmer</label>
                            <input type="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Taille (cm)</label>
                            <input type="number" placeholder="170">
                        </div>
                        <div class="input-group">
                            <label>Poids (kg)</label>
                            <input type="number" placeholder="65">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Objectif</label>
                        <select>
                            <option>Perte de poids</option>
                            <option>Maintien</option>
                            <option>Prise de muscle</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-register">S'inscrire</button>
                </form>

                <p class="login-link">
                    Déjà inscrit ? <a href="login.html">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
