<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon profil - NutriWise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span>🌿</span>
                <span>NutriWise</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">👤 Mon profil</a>
                <a href="#" class="nav-item">📊 Mon tableau</a>
                <a href="#" class="nav-item">🥗 Mes repas</a>
                <a href="#" class="nav-item">📖 Mes recettes</a>
            </nav>
            <a href="login.html" class="logout">🚪 Déconnexion</a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="profile-header">
                <div class="profile-avatar">
                    <div class="avatar-large">👤</div>
                    <h1>Sophie Martin</h1>
                    <p>Membre depuis janvier 2024</p>
                </div>
            </header>

            <!-- Stats Cards -->
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-value">22.5</div>
                    <div class="stat-label">IMC</div>
                    <div class="stat-status healthy">✅ Normal</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">65</div>
                    <div class="stat-label">Poids (kg)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">165</div>
                    <div class="stat-label">Taille (cm)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">1,850</div>
                    <div class="stat-label">Calories/jour</div>
                </div>
            </div>

            <!-- Profile Info Form -->
            <div class="profile-section">
                <h2>Informations personnelles</h2>
                <form class="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" value="Sophie">
                        </div>
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" value="Martin">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" value="sophie.martin@email.com">
                        </div>
                        <div class="form-group">
                            <label>Téléphone</label>
                            <input type="tel" value="06 12 34 56 78">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Taille (cm)</label>
                            <input type="number" value="165">
                        </div>
                        <div class="form-group">
                            <label>Poids (kg)</label>
                            <input type="number" value="65">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Objectif</label>
                        <select>
                            <option>Perte de poids</option>
                            <option selected>Maintien</option>
                            <option>Prise de muscle</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-save">Enregistrer les modifications</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
