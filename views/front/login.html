<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - NutriWise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="brand">
                <span class="logo-icon">🌿</span>
                <h1>NutriWise</h1>
                <p>Nutrition intelligente et durable</p>
            </div>
            <div class="illustration">
                <div class="food-icons">
                    <span>🥗</span>
                    <span>🍎</span>
                    <span>🥑</span>
                    <span>🥦</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form-container">
                <h2>Connexion</h2>
                <p class="welcome-text">Ravis de vous revoir !</p>

                <form class="login-form">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="exemple@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Mot de passe</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox"> Se souvenir de moi
                        </label>
                        <a href="motpasse.html" class="forgot-password">Mot de passe oublié ?</a>
                    </div>
                    <button type="submit" class="btn-login">Se connecter</button>
                </form>

                <p class="register-link">
                    Pas encore de compte ? <a href="register.html">S'inscrire</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
